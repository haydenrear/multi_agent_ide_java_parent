logging.config: classpath:logback-multi-agent-ide.xml

multi-agent-embabel:
  chat-model:
    provider: acp
  acp:
    default-provider: claude
    providers:
      claude:
        transport: stdio
        command: ${ACP_COMMAND:claude-agent-acp}
        args: ${ACP_ARGS:}
        working-directory: ${ACP_WORKING_DIR:}
llm:
  model-selection:
    default-model: sonnet
    by-agent-type:
      commit-agent: haiku
      merge-conflict-agent: haiku
      ai-filter: haiku
    by-template: {}

acp.mcp:
  http:
    #    - name: deepwiki
    #      url: https://mcp.deepwiki.com/mcp
    #      headers:
    - name: hindsight
      url: http://localhost:8777/mcp/${HINDSIGHT_MEM_BANK:agentic-coding}
      headers:
