logging.config: classpath:logback-multi-agent-ide.xml

multi-agent-embabel:
  acp:
    default-provider: claude_openrouter

llm:
  model-selection:
    default-model:
      model: openai/gpt-oss-120b
      provider: claude_openrouter
    by-agent-type:
      # consider changing these to low parameter
      commit-agent:
        model: openai/gpt-oss-120b
        provider: claude_openrouter
      merge-conflict-agent:
        model: openai/gpt-oss-120b
        provider: claude_openrouter
      ai-filter:
        model: openai/gpt-oss-120b
        provider: claude_openrouter
    by-template: {}

acp.mcp:
