spring:
  lifecycle:
    timeout-per-shutdown-phase: 1s

# Artifact persistence configuration for tests
artifacts:
  persistence:
    enabled: true
    batch-size: 100
  templates:
    load-on-startup: true
    source-paths:
      - classpath:prompts/workflow/
llm:
  model-selection:
    default-model: sonnet
    by-agent-type:
      commit-agent: haiku
      merge-conflict-agent: haiku
      ai-filter: haiku
    by-template: {}

acp.mcp:
  http:
    enabled: false
