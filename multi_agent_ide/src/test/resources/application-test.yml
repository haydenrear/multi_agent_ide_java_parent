spring:
  lifecycle:
    timeout-per-shutdown-phase: 1s
  main:
    allow-bean-definition-overriding: true

# Artifact persistence configuration for tests
artifacts:
  persistence:
    enabled: true
    batch-size: 100
  templates:
    load-on-startup: true
    source-paths:
      - classpath:prompts/workflow/
llm:
  model-selection:
    default-model:
      model: sonnet
      provider: claude
    by-agent-type:
      commit-agent:
        model: haiku
        provider: claude
      merge-conflict-agent:
        model: haiku
        provider: claude
      ai-filter:
        model: haiku
        provider: claude
    by-template: {}

acp.mcp:
  http:
    enabled: false

multi-agent-ide:
  retry:
    max-compaction-polls: 1
    compaction-poll-interval-ms: 50
